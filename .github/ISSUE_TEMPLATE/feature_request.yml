name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for schulpipeline? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? Why is it needed?
      placeholder: "I often need to ... but currently ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include CLI examples if applicable.
      placeholder: |
        schulpipeline run --new-flag "..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've thought about?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Pipeline stages
        - Scanner / classification
        - Output formats (PPTX, DOCX, MD)
        - Styles / visual system
        - Backends / routing
        - CLI / UX
        - Configuration
        - Documentation
        - Other
    validations:
      required: false
