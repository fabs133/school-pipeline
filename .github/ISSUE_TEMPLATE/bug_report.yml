name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: "When I run `schulpipeline run ...`, it fails with..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `schulpipeline run --input example.docx`
        2. Wait for pipeline to complete
        3. See error in stage X
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant output (use `--log-level DEBUG` for more detail).
      render: shell

  - type: dropdown
    id: backend
    attributes:
      label: Backend Used
      options:
        - Groq
        - Gemini
        - Mistral
        - OpenAI
        - Ollama
        - "Don't know / multiple"
    validations:
      required: false

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "3.11.8"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Windows 11 / Ubuntu 22.04 / macOS 14"
